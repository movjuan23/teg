<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu mensaje! - Movimiento Juan XXIII</title>
    <link rel="icon" type="image/png" href="4K.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B1523 0%, #152238 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">

    <div class="max-w-md w-full bg-[#152238] border-2 border-[#1E4D8B] rounded-3xl p-8 text-center shadow-2xl relative overflow-hidden">
        
        <div class="absolute top-0 left-0 right-0 h-2 bg-[#FFD700]"></div>

        <div class="w-20 h-20 bg-[#FFD700] rounded-full flex items-center justify-center text-slate-900 text-4xl font-bold mx-auto mb-6 shadow-lg animate-bounce">
            ❤️
        </div>

        <h1 class="text-3xl font-black text-white mb-4 tracking-tight">
            ¡Mensaje Enviado!
        </h1>
        
        <p class="text-slate-300 text-base leading-relaxed mb-8">
            Gracias por enviar tu mensaje. En breve nos comunicaremos contigo. ¡Que Dios te bendiga!
        </p>

        <a href="index.html" class="inline-block w-full py-4 px-6 bg-[#FFD700] hover:bg-[#FFC72C] text-slate-900 font-extrabold text-lg rounded-xl transition duration-300 shadow-md transform hover:-translate-y-1 border-2 border-[#1E4D8B]">
            Volver al Inicio
        </a>

        <div class="mt-8 pt-6 border-t border-slate-700/50 flex items-center justify-center gap-2 text-xs text-slate-400">
            <img src="4K.png" alt="Logo" class="h-6 w-6 object-contain rounded-full">
            <span>Movimiento Juan XXIII - Honduras</span>
        </div>
    </div>

</body>
</html>
